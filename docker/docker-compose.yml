services:
  iceberg-catalog:
    build: ./iceberg
    image: dbprove-iceberg:latest
    ports:
      - "19120:19120"
      - "19130:19130"
    volumes:
      - ../run/table_data:/opt/dbprove/table_data:ro
      - ../run/mount/iceberg:/opt/dbprove/warehouse

  postgresql-native:
    build: ./postgresql/local/native
    image: dbprove-postgresql:latest
    shm_size: '256m'
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    ports:
      - "65432:5432"
    volumes:
      - ../run/mount/postgresql:/var/lib/postgresql

  clickhouse-native:
    build: ./clickhouse/local/native
    image: dbprove-clickhouse:latest
    environment:
      - CLICKHOUSE_PASSWORD=default
    ports:
      - "8123:8123"
      - "65432:9000"
    volumes:
      - ../run/mount/clickhouse:/var/lib/clickhouse
      - ../run/table_data:/var/lib/clickhouse/user_files/table_data:ro

  mssql-native:
    build: ./mssql/local/native
    image: dbprove-mssql:latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=Developer
    ports:
      - "65432:1433"
    volumes:
      - ../run/mount/mssql:/var/opt/mssql
      - ../run/table_data:/var/opt/mssql/table_data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -l 5 -t 5 -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SET NOCOUNT ON; SELECT 1\" >/dev/null 2>&1 || exit 1"
        ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s

  trino-iceberg:
    build: ./trino/local/iceberg
    image: dbprove-trino:latest
    mem_limit: 7g
    depends_on:
      - iceberg-catalog
    ports:
      - "65432:8080"
    tmpfs:
      - /mnt/tpch-tmpfs:size=4g,uid=1000,gid=1000,mode=755
    volumes:
      - ../run/mount/trino:/data/trino
      - ../run/table_data:/opt/dbprove/table_data:ro
      - ../run/mount/iceberg:/opt/dbprove/warehouse

  datafusion-iceberg:
    build: ./datafusion/local/iceberg
    image: dbprove-datafusion:latest
    mem_limit: 7g
    tmpfs:
      - /mnt/tpch-tmpfs:size=4g
    volumes:
      - ../run/mount/datafusion:/workspace
      - ../run/table_data:/opt/dbprove/table_data:ro
      - ../run/table_data:/opt/table-data-source:ro
