# PostgreSQL benchmark-tuned configuration
# NOTE: These settings favor performance over durability. Use ONLY for benchmarking.
# They are generic and may need adjustment for your host resources.

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 200

#------------------------------------------------------------------------------
# MEMORY SETTINGS (generic baseline)
#------------------------------------------------------------------------------
# Adjust based on host RAM (e.g., for 16GB RAM, consider shared_buffers=4GB)
shared_buffers = 2GB
work_mem = 64MB
maintenance_work_mem = 1GB
effective_cache_size = 6GB

#------------------------------------------------------------------------------
# CHECKPOINTS / WAL
#------------------------------------------------------------------------------
# For pure benchmarking you can disable durability to reduce I/O overhead.
# WARNING: You can lose data if the server crashes.
fsync = off
synchronous_commit = off
full_page_writes = off
wal_compression = on
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_timeout = '30 min'
checkpoint_completion_target = 0.9

#------------------------------------------------------------------------------
# QUERY TUNING
#------------------------------------------------------------------------------
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200
max_parallel_workers_per_gather = 4
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
jit = off

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------
log_min_duration_statement = -1
log_checkpoints = on
log_connections = off
log_disconnections = off
